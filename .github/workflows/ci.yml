name: CI

# Runs the unit suite on every push/PR. This is the cross-repo regression net:
# the 4 feishu-bot-* repos mirror each other and shared fixes have been lost in
# manual syncs before — a regressed unit test (esp. test_p0_regressions.py)
# turns CI red here.
#
# Integration tests (tests/integration, tests/golden) need a real tmux/zellij
# server or recorded sessions and are intentionally NOT run in CI.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[win,dev]"
      - name: Test (unit)
        run: pytest tests/unit -q
