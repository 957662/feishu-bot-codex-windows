name: CI

# Runs the suite on a real Windows runner so platform-specific code paths
# (msvcrt file locking, win32cred Credential Manager, cp1252 default encoding,
# ProactorEventLoop subprocess handling) are actually exercised — these cannot
# be verified on the macOS/Linux dev hosts the package was originally written on.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[win,dev]"
      - name: Test
        run: pytest -q
